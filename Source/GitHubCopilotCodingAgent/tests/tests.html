<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reversi Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: #1f2933;
      color: #f0f4f8;
      margin: 0;
      padding: 24px;
    }
    h1 {
      font-size: 1.4rem;
    }
    .summary {
      font-size: 1.2rem;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 6px;
      display: inline-block;
    }
    .summary.pass {
      background: #1b5e20;
      color: #d7ffd9;
    }
    .summary.fail {
      background: #7f1d1d;
      color: #ffd7d7;
    }
    ul.test-list {
      list-style: none;
      padding: 0;
      margin: 16px 0 0;
      max-width: 720px;
    }
    li.test {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 6px;
      background: #2d3a45;
    }
    .status {
      font-weight: 700;
      min-width: 52px;
      text-align: center;
      padding: 2px 6px;
      border-radius: 4px;
    }
    li.pass .status {
      background: #1b5e20;
      color: #d7ffd9;
    }
    li.fail .status {
      background: #7f1d1d;
      color: #ffd7d7;
    }
    .name {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }
    .message {
      color: #ffb4b4;
      margin-left: auto;
      font-size: 0.9rem;
    }
    a {
      color: #f5b301;
    }
  </style>
</head>
<body>
  <h1>Reversi - Test Results</h1>
  <p><a href="../index.html">&larr; ゲームへ戻る / Back to game</a></p>
  <div id="results">Running tests&hellip;</div>

  <script src="../game.js"></script>
  <script src="tests.js"></script>
</body>
</html>
